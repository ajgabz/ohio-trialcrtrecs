<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Basic Page Needs
    –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <meta charset="utf-8">
    <title>Ohio Trial Court Case Databases</title>
    
    <!-- Mobile Specific Metas
    –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- FONT
    –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <link href='https://fonts.googleapis.com/css?family=Raleway:400,300,600' rel='stylesheet' type='text/css'>

    <!-- CSS
    –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/skeleton.css">
    <link rel="stylesheet" href="css/custom.css">
    
</head>
<body>
<div class="container" id="mainContainer">

    <section class="header">
        <h2 class="title undecorated-link"><a href="index.html">Ohio Trial Court Case Record Databases</a></h2>
    </section>



    <div class="row" text-align="center">
       <div class="three columns">&nbsp;</div>
       <div class="two columns">
       <p style="padding-top: 0.5em; text-transform: uppercase; font-size: 1.4rem; letter-spacing: .2rem; font-weight: 600">COUNTY:</p>
       </div>
        <div class="one column">
        <select class="button button-primary" id="selectedCountyField" onchange="showContent(this);">
        </select> 
        </div>
        <div class="five columns">&nbsp;&nbsp;&nbsp;</div>
    </div>
    <hr>


    <div id="listings"></div>


    




    <div id="footer">
        <hr>
        <p>Proof-of-Concept by <a href="https://ajgaba.com">Aaron Gaba</a></p>
        <p><a href="https://www.supremecourt.ohio.gov/courts/judicial-system/ohio-trial-courts/#Court-List">More Information about Ohio Trial Courts</a></p> 
    </div>

</div>


<script type="text/javascript" src="courtData.js"></script>
<script type="text/javascript">

const keysArray = Object.keys(courtListings);
keysArray.sort();

keysArray.forEach(key => {
  
  var dropdownOption = document.createElement('option');
  dropdownOption.value = key;
  dropdownOption.text = key;
  document.getElementById("selectedCountyField").appendChild(dropdownOption);

  var entryDiv = document.createElement('div');
  entryDiv.id = key;
  entryDiv.classList.add("resultField");
  entryDiv.style.display = "none";
  
  var headingElement = document.createElement('h4');
  headingElement.textContent = key + " County";
  entryDiv.appendChild(headingElement);
  
  const countyCourts = courtListings[key];
  var countyCourtListings = document.createElement('ul');

  for (let i = 0; i < countyCourts.length; i++) {
    if (countyCourts[i]['Record Search URL'] !== null) {
        var listElement = document.createElement('li');
        var courtLink = document.createElement('a');
        courtLink.href = countyCourts[i]['Record Search URL'];
        courtLink.textContent = countyCourts[i]['Court'];

        listElement.appendChild(courtLink);
        countyCourtListings.appendChild(listElement);
    }
  }

  entryDiv.appendChild(countyCourtListings);
  document.getElementById("listings").appendChild(entryDiv);
});


function showContent(selectedElement) {
    const childElements = document.getElementsByClassName("resultField");
    for (let i = 0; i < childElements.length; i++) {
        childElements[i].style.display = "none";
    }

    const selectedCounty = selectedElement.value;

    document.getElementById(selectedCounty).style.display = "block";
}

// Slight delay needed to prevent caching issue
window.onload = function() {
    setTimeout(function(){showContent(document.getElementById("selectedCountyField"));}, 100);
}


</script>

</body>
</html>
